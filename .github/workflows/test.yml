name: CI/CD — CENE Platform

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── 1. Backend Tests ────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django djangorestframework djangorestframework-simplejwt django-cors-headers gTTS requests
          pip install pytest pytest-django pytest-cov model-bakery
      - name: Run backend tests
        run: |
          cd backend
          pytest

  # ── 2. Frontend Unit Tests ─────────────────────────────────────────────────
  frontend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test

  # ── 3. E2E Tests ───────────────────────────────────────────────────────────
  e2e-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Frontend deps
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Install Backend deps
        run: |
          python -m pip install --upgrade pip
          pip install Django djangorestframework djangorestframework-simplejwt django-cors-headers gTTS requests
      - name: Setup Backend Data
        run: |
          cd backend
          python manage.py migrate
          python create_test_user.py
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXTAUTH_SECRET: "rei-bebe-super-secret-key-2026"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ── 4. Deploy Backend → Render (somente em push no main) ──────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [backend-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            --max-time 30
        # O RENDER_DEPLOY_HOOK deve ser configurado em:
        # GitHub → Settings → Secrets and variables → Actions → New repository secret
        # Valor: URL do Deploy Hook disponível em Render Dashboard → seu service → Settings → Deploy Hook
