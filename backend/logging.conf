[loggers]
keys=root,django,reibb

[handlers]
keys=console,file

[formatters]
keys=json,simple

[logger_root]
level=INFO
handlers=console

[logger_django]
level=INFO
handlers=console
qualname=django
propagate=0

[logger_reibb]
level=DEBUG
handlers=console,file
qualname=reibb
propagate=0

[handler_console]
class=StreamHandler
level=DEBUG
formatter=simple
args=(sys.stdout,)

[handler_file]
class=logging.handlers.RotatingFileHandler
level=ERROR
formatter=json
args=('logs/api_errors.log', 'a', 10485760, 5)

[formatter_simple]
format=%(levelname)s %(asctime)s %(module)s %(message)s

[formatter_json]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(levelname)s %(name)s %(message)s %(error_code)s %(user_id)s
