<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reibb - Offline</title>
  <style>
    :root { color-scheme: light dark; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; padding: 2rem; 
      display: flex; align-items: center; justify-content: center; 
      min-height: 100vh; background: #ffffff; color: #0f172a;
    }
    .card { 
      max-width: 400px; text-align: center; 
      background: white; padding: 3rem; border-radius: 3rem; 
      border: 1px solid #f1f5f9;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
    }
    .icon { 
      font-size: 4rem; margin-bottom: 2rem; 
      background: #f0fdf4; width: 100px; height: 100px; 
      display: flex; align-items: center; justify-content: center;
      border-radius: 2rem; margin-left: auto; margin-right: auto;
    }
    h1 { font-size: 1.5rem; font-weight: 900; margin: 0 0 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
    p { color: #64748b; margin: 0 0 2rem; line-height: 1.6; font-weight: 500; font-size: 0.875rem; }
    .btn { 
      display: inline-block; padding: 1rem 2rem; 
      background: #10b981; color: white; text-decoration: none; 
      border-radius: 1rem; font-weight: 900; text-transform: uppercase; 
      letter-spacing: 0.1em; font-size: 0.75rem;
      transition: all 0.2s;
    }
    .btn:hover { background: #059669; transform: translateY(-2px); }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      .card { background: #1e293b; border-color: #334155; }
      p { color: #94a3b8; }
      .icon { background: #064e3b; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📴</div>
    <h1>Você está offline</h1>
    <p>Conecte-se à internet para acessar novos conteúdos. Seus dados salvos localmente permanecem seguros e serão sincronizados automaticamente.</p>
    <a href="/portal/paciente" class="btn">Voltar ao Painel</a>
  </div>
  
  <script>
    // Auto-recarrega quando voltar online
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
